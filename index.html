<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧳 Packing Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>.swipe-item { transition: transform 0.1s ease-out; touch-action: pan-y; }</style>
</head>
<body class="bg-gray-50 p-4">

<div class="max-w-2xl mx-auto space-y-5" x-data="packerApp()" x-init="init()">
    <header class="flex flex-col gap-3">
        <h1 class="text-3xl font-light">Packing Assistant</h1>
        <div class="w-full bg-gray-200 h-4 rounded-full overflow-hidden">
            <div class="h-full transition-all duration-500" :class="progress === 100 ? 'bg-green-500' : 'bg-blue-600'" :style="'width: ' + progress + '%'"></div>
        </div>
    </header>

    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex justify-between items-center">
        <!-- Displayed blank if totalDays is empty -->
        <div><p class="text-xs text-gray-500 uppercase font-bold">Total Duration</p><p class="text-2xl font-bold" x-text="totalDays ? totalDays + ' Days' : ''"></p></div>
        <div><p class="text-xs text-gray-500 uppercase font-bold">Packed</p><p class="text-2xl font-bold" x-text="packedCount + '/' + activeItemsCount"></p></div>
    </div>

    <!-- Itinerary -->
    <div class="space-y-4">
        <template x-for="(stop, index) in stops" :key="index">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3">
                <input type="text" x-model="stop.city" class="w-full p-3 text-base border rounded-lg" placeholder="Enter city...">
                <input type="text" :id="'date-input-' + index" x-model="stop.dateRange" class="w-full p-3 text-base border rounded-lg bg-white" placeholder="Select dates..." readonly>
                <button x-show="index > 0" @click="removeStop(index)" class="w-full p-2 text-red-500 font-bold text-sm bg-red-50 rounded-lg">Remove Stop</button>
            </div>
        </template>
        <button @click="addStop()" class="w-full p-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-bold text-sm uppercase">+ Add City</button>
    </div>

    <button @click="populateData()" class="w-full p-5 bg-gray-900 text-white rounded-xl text-lg font-bold">Generate Packing List</button>

    <!-- Lists -->
    <div class="space-y-5">
        <template x-for="category in ['Suitcase', 'Backpack', 'Dopp Kit']" :key="category">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200" x-data="{ manualInput: '' }">
                <h2 class="font-bold mb-3 uppercase text-sm tracking-widest text-gray-400" x-text="category"></h2>
                <ul class="space-y-1 overflow-hidden">
                    <template x-for="(item, index) in items.filter(i => i.cat === category)" :key="item.id">
                        <li class="flex items-center gap-3 p-2 border-b border-gray-50 bg-white swipe-item"
                            @touchstart="touchStart($event)" @touchmove="touchMove($event, $el)" @touchend="touchEnd($event, item, $el)">
                            <div class="flex gap-1">
                                <button @click="moveItem(item, -1, category)" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-blue-600 bg-gray-50 rounded">▲</button>
                                <button @click="moveItem(item, 1, category)" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-blue-600 bg-gray-50 rounded">▼</button>
                            </div>
                            <span :class="{'line-through text-gray-400': item.status !== '', 'font-bold text-blue-600': item.isAuto && item.status === '' && category !== 'Dopp Kit'}" class="flex-grow">
                                <span x-text="item.name"></span>
                                <span x-show="item.qty > 1" x-text="' (' + item.qty + ')'" class="text-xs text-gray-400 ml-1 font-normal"></span>
                            </span>
                            <div class="flex items-center gap-2">
                                <button @click="item.qty > 1 ? item.qty-- : 1" class="w-8 h-8 bg-gray-100 rounded">-</button>
                                <button @click="item.qty++" class="w-8 h-8 bg-gray-100 rounded">+</button>
                                <button @click="toggleStatus(item)" class="w-8 h-8 rounded-lg border-2" :class="statusClass(item)" x-text="item.status || '○'"></button>
                            </div>
                        </li>
                    </template>
                </ul>
                <input type="text" x-model="manualInput" @keydown.enter="addManualItem(category, manualInput); manualInput=''" placeholder="+ Add custom..." class="w-full mt-4 p-3 border rounded-lg">
            </div>
        </template>
    </div>

    <button @click="items.forEach(i => i.status = '')" class="w-full p-4 border border-gray-300 rounded-xl text-gray-600 font-bold text-sm uppercase tracking-widest hover:bg-gray-100">Reset All Statuses</button>
</div>

<script>
    function packerApp() {
        return {
            stops: [{city: '', dateRange: '', start: null, end: null}],
            items: [], touchStartX: 0,
            init() {
                const saved = localStorage.getItem('packingData');
                if (saved) { const parsed = JSON.parse(saved); this.stops = parsed.stops; this.items = parsed.items; }
                this.$nextTick(() => this.initDatePicker(0));
                this.$watch('items', val => localStorage.setItem('packingData', JSON.stringify({stops: this.stops, items: this.items})));
            },
            initDatePicker(idx) { 
                flatpickr(`#date-input-${idx}`, { mode: "range", dateFormat: "Y-m-d", onChange: (d) => { this.stops[idx].start = d[0]; this.stops[idx].end = d[1]; } }); 
            },
            addStop() { this.stops.push({city: '', dateRange: '', start: null, end: null}); this.$nextTick(() => this.initDatePicker(this.stops.length - 1)); },
            removeStop(i) { this.stops.splice(i, 1); },
            touchStart(e) { this.touchStartX = e.touches[0].clientX; },
            touchMove(e, el) { const diff = e.touches[0].clientX - this.touchStartX; if (diff < 0) el.style.transform = `translateX(${diff}px)`; },
            touchEnd(e, item, el) { const diff = e.changedTouches[0].clientX - this.touchStartX; if (diff < -100) { this.items = this.items.filter(i => i.id !== item.id); } else { el.style.transform = 'translateX(0)'; } },
            moveItem(item, dir, cat) {
                let catItems = this.items.filter(i => i.cat === cat);
                const idx = catItems.findIndex(i => i.id === item.id);
                const nIdx = idx + dir;
                if (nIdx >= 0 && nIdx < catItems.length && catItems[idx].isAuto === catItems[nIdx].isAuto) {
                    const temp = catItems[idx]; catItems[idx] = catItems[nIdx]; catItems[nIdx] = temp;
                    this.items = [...this.items.filter(i => i.cat !== cat), ...catItems];
                }
            },
            toggleStatus(item) { const s = ['', '✓', 'X']; item.status = s[(s.indexOf(item.status) + 1) % 3]; },
            statusClass(item) { return {'bg-green-500 text-white': item.status === '✓', 'bg-red-500 text-white': item.status === 'X', 'bg-white': item.status === ''}; },
            addManualItem(cat, name) { if(name) this.items.push({id: Date.now(), name, qty: 1, cat, status: '', isAuto: false}); },
            get totalDays() { 
                const days = this.stops.reduce((a, s) => s.start && s.end ? a + Math.ceil((s.end - s.start)/86400000) : a, 0); 
                return days > 0 ? days : ''; 
            },
            get activeItemsCount() { return this.items.filter(i => i.status !== 'X').length; },
            get packedCount() { return this.items.filter(i => i.status === '✓').length; },
            get progress() { return this.activeItemsCount > 0 ? (this.packedCount / this.activeItemsCount) * 100 : 0; },
            populateData() {
                const days = Math.max(1, parseInt(this.totalDays) || 1);
                let pants = 0, shorts = 0, outer = [];
                this.stops.forEach(s => {
                    if (!s.start) return;
                    const m = new Date(s.start).getMonth();
                    if (m <= 2 || m >= 10) { pants += Math.ceil(days / 2.5); outer.push('Puffer Jacket'); }
                    else { shorts += Math.ceil(days / 2.5); outer.push('Light Hoodie'); }
                });
                let defaults = [
                    {n: 'T-shirts', c: 'Suitcase', q: days}, 
                    {n: shorts > 0 ? 'Shorts' : 'Pants', c: 'Suitcase', q: Math.max(1, shorts > 0 ? shorts : pants)}, 
                    {n: 'Underwear', c: 'Suitcase', q: days}, 
                    {n: 'Socks', c: 'Suitcase', q: days},
                    {n: 'Toothbrush', c: 'Dopp Kit', q: 1}, {n: 'Tongue Scraper', c: 'Dopp Kit', q: 1}, {n: 'Floss Picks', c: 'Dopp Kit', q: days},
                    {n: 'Invisalign', c: 'Dopp Kit', q: 1}, {n: 'Denture Tablets', c: 'Dopp Kit', q: days}, {n: 'AM Moisturizer', c: 'Dopp Kit', q: 1},
                    {n: 'PM Moisturizer', c: 'Dopp Kit', q: 1}, {n: 'Vitamin C', c: 'Dopp Kit', q: 1}, {n: 'Retinal', c: 'Dopp Kit', q: 1},
                    {n: 'Facewash', c: 'Dopp Kit', q: 1}, {n: 'Shaver', c: 'Dopp Kit', q: 1}, {n: 'Nail Clippers', c: 'Dopp Kit', q: 1}, {n: 'Tweezers', c: 'Dopp Kit', q: 1}
                ];
                outer.forEach((n, i) => defaults.push({n, c: 'Backpack', q: 1}));
                this.items = [...this.items.filter(i => !i.isAuto), ...defaults.map((d, i) => ({id: Date.now() + i, name: d.n, cat: d.c, qty: d.q, status: '', isAuto: true}))];
            }
        }
    }
</script>
</body>
</html>

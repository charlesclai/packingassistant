<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧳 Packing Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/sort@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body class="bg-gray-50 p-4" x-data="packerApp()" x-init="init()">

<div class="max-w-2xl mx-auto space-y-5">
    <header class="flex flex-col gap-3">
        <h1 class="text-3xl font-light">Packing Assistant</h1>
        <div class="w-full bg-gray-200 h-4 rounded-full overflow-hidden">
            <div class="bg-blue-600 h-full transition-all duration-500" :style="'width: ' + progress + '%'"></div>
        </div>
    </header>

    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex justify-between items-center">
        <div>
            <p class="text-xs text-gray-500 uppercase font-bold">Total Duration</p>
            <p class="text-2xl font-bold" x-text="totalDays"></p>
        </div>
        <div>
            <p class="text-xs text-gray-500 uppercase font-bold">Packed</p>
            <p class="text-2xl font-bold" x-text="packedCount + '/' + activeItemsCount"></p>
        </div>
    </div>

    <!-- Itinerary -->
    <div class="space-y-4">
        <template x-for="(stop, index) in stops" :key="index">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3">
                <div class="relative">
                    <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">City</label>
                    <input type="text" x-model="stop.city" class="w-full p-3 text-base border rounded-lg" placeholder="Enter city...">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Travel Dates</label>
                    <input type="text" :id="'date-input-' + index" x-model="stop.dateRange" class="w-full p-3 text-base border rounded-lg bg-white cursor-pointer" placeholder="Select range..." readonly>
                </div>
                <button x-show="index > 0" @click="removeStop(index)" class="w-full p-2 text-red-500 font-bold text-sm bg-red-50 rounded-lg">Remove Stop</button>
            </div>
        </template>
        <button @click="addStop()" class="w-full p-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-bold text-sm uppercase tracking-widest">+ Add City</button>
    </div>

    <button @click="populateClothing()" class="w-full p-5 bg-gray-900 text-white rounded-xl text-lg font-bold hover:bg-black transition-colors">Generate Packing List</button>

    <!-- Lists -->
    <div class="space-y-5">
        <template x-for="category in ['Suitcase', 'Backpack']" :key="category">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200" x-data="{ manualInput: '' }">
                <h2 class="font-bold mb-3 uppercase text-sm tracking-widest text-gray-400" x-text="category"></h2>
                <ul class="space-y-1" x-sort="onSort($item, $position, category)">
                    <template x-for="item in items.filter(i => i.cat === category).sort((a, b) => b.isAuto - a.isAuto)" :key="item.id">
                        <li class="flex items-center justify-between p-2 border-b border-gray-50">
                            <div x-sort:item="item" class="cursor-grab text-gray-300 mr-3 hover:text-gray-500 select-none">⠿</div>
                            <span :class="{'line-through text-gray-400': item.status !== '', 'font-bold text-blue-600': item.isAuto && item.status === '', 'text-black': !item.isAuto && item.status === ''}" class="text-base flex-grow">
                                <span x-text="item.name"></span><span x-show="item.qty > 1" x-text="' (' + item.qty + ')'" class="text-xs text-gray-400 ml-1"></span>
                            </span>
                            <div class="flex items-center gap-2">
                                <button @click="item.qty > 0 ? item.qty-- : 0" class="w-8 h-8 bg-gray-100 rounded font-bold text-base">-</button>
                                <button @click="item.qty++" class="w-8 h-8 bg-gray-100 rounded font-bold text-base">+</button>
                                <button @click="toggleStatus(item)" class="w-10 h-10 rounded-lg border-2 transition-colors text-lg" :class="statusClass(item)" x-text="item.status || '○'"></button>
                                <button @click="items.splice(items.findIndex(i => i.id === item.id), 1)" class="text-gray-300 hover:text-red-500 text-xl px-1">✕</button>
                            </div>
                        </li>
                    </template>
                </ul>
                <div class="mt-4">
                    <input type="text" x-model="manualInput" @keydown.enter="addManualItem(category, manualInput); manualInput=''" placeholder="+ Add custom item..." class="w-full p-3 text-base border rounded-lg">
                </div>
            </div>
        </template>
    </div>

    <button @click="resetStatuses()" class="w-full p-4 border border-gray-300 rounded-xl text-gray-600 font-bold text-sm uppercase tracking-widest hover:bg-gray-100">Reset All Statuses</button>
</div>

<script>
    function packerApp() {
        return {
            stops: [{city: '', dateRange: '', start: null, end: null}],
            items: [],
            
            init() {
                const saved = localStorage.getItem('packingData');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed.items) && parsed.items.length < 100) {
                            this.stops = parsed.stops || [{city: '', dateRange: '', start: null, end: null}];
                            this.items = parsed.items;
                        }
                    } catch (e) { localStorage.removeItem('packingData'); }
                }
                this.$nextTick(() => this.stops.forEach((_, i) => this.initDatePicker(i)));
                this.$watch('items', val => localStorage.setItem('packingData', JSON.stringify({stops: this.stops, items: this.items})));
            },

            onSort(item, position, newCategory) {
                const oldIndex = this.items.indexOf(item);
                this.items.splice(oldIndex, 1);
                item.cat = newCategory;
                this.items.splice(position, 0, item);
            },

            initDatePicker(index) { flatpickr(`#date-input-${index}`, { mode: "range", dateFormat: "Y-m-d", onChange: (dates) => { this.stops[index].start = dates[0]; this.stops[index].end = dates[1]; } }); },
            addStop() { this.stops.push({city: '', dateRange: '', start: null, end: null}); this.$nextTick(() => this.initDatePicker(this.stops.length - 1)); },
            removeStop(index) { this.stops.splice(index, 1); },
            resetStatuses() { this.items.forEach(i => i.status = ''); },

            get totalDays() { const days = this.stops.reduce((acc, s) => s.start && s.end ? acc + (Math.ceil((s.end - s.start) / 86400000)) : acc, 0); return days > 0 ? days + ' Days' : ''; },
            get activeItemsCount() { return this.items.filter(i => i.status !== 'X').length; },
            get packedCount() { return this.items.filter(i => i.status === '✓').length; },
            get progress() { return this.activeItemsCount > 0 ? (this.packedCount / this.activeItemsCount) * 100 : 0; },

            toggleStatus(item) { const states = ['', '✓', 'X']; item.status = states[(states.indexOf(item.status) + 1) % 3]; },
            statusClass(item) { return {'bg-green-500 text-white border-green-500': item.status === '✓', 'bg-red-500 text-white border-red-500': item.status === 'X', 'bg-white': item.status === ''}; },
            addManualItem(cat, name) { if(!name) return; this.items.push({id: Date.now(), name: name, qty: 1, cat: cat, status: '', isAuto: false}); },
            
            populateClothing() {
                let totalDuration = 0;
                let shortsTotalDays = 0;
                let pantsTotalDays = 0;
                let outerList = new Set();

                this.stops.forEach(stop => {
                    if (!stop.start || !stop.end) return;
                    // Changed to exclude the first day
                    const days = Math.ceil((stop.end - stop.start) / 86400000);
                    totalDuration += days;
                    
                    const month = new Date(stop.start).getMonth();
                    const isCold = month <= 2 || month >= 10;
                    const city = stop.city.toLowerCase();
                    const isWarmCity = city.includes('san diego') || city.includes('palm springs') || city.includes('miami');
                    
                    if (isCold && !isWarmCity) {
                        pantsTotalDays += days;
                        outerList.add('Puffer Jacket');
                    } else {
                        shortsTotalDays += days;
                        outerList.add('Light Hoodie');
                    }
                });
                
                let newItems = [
                    {id: 1, name: 'T-shirts', qty: totalDuration, cat: 'Suitcase', status: '', isAuto: true},
                    {id: 2, name: 'Underwear', qty: totalDuration, cat: 'Suitcase', status: '', isAuto: true},
                    {id: 3, name: 'Socks', qty: totalDuration, cat: 'Suitcase', status: '', isAuto: true}
                ];

                if (shortsTotalDays > 0) newItems.push({id: 4, name: 'Shorts', qty: Math.ceil(shortsTotalDays / 2.5), cat: 'Suitcase', status: '', isAuto: true});
                if (pantsTotalDays > 0) newItems.push({id: 5, name: 'Pants', qty: Math.ceil(pantsTotalDays / 2.5), cat: 'Suitcase', status: '', isAuto: true});
                outerList.forEach((name, idx) => {
                    newItems.push({id: 10 + idx, name: name, qty: 1, cat: 'Backpack', status: '', isAuto: true});
                });
                
                this.items = [...this.items.filter(i => !i.isAuto), ...newItems];
            }
        }
    }
</script>
</body>
</html>

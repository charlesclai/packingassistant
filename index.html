<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧳 Packing Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/sort@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        .swipe-item { transition: transform 0.1s ease-out; }
        .sortable-chosen { @apply shadow-2xl scale-105 bg-blue-50 cursor-grabbing; opacity: 0.9; }
        .sortable-ghost { @apply opacity-30 bg-gray-100; }
        /* Ensure the handle is the only place to trigger sorting */
        .handle { touch-action: none; cursor: grab; }
    </style>
</head>
<body class="bg-gray-50 p-4" x-data="packerApp()" x-init="init()">

<div class="max-w-2xl mx-auto space-y-5">
    <!-- Header/Itinerary/Stats (Same as before) -->
    <header class="flex flex-col gap-3">
        <h1 class="text-3xl font-light">Packing Assistant</h1>
        <div class="w-full bg-gray-200 h-4 rounded-full overflow-hidden">
            <div class="h-full transition-all duration-500" 
                 :class="progress === 100 ? 'bg-green-500' : 'bg-blue-600'"
                 :style="'width: ' + progress + '%'"></div>
        </div>
    </header>

    <div class="space-y-5">
        <template x-for="category in ['Suitcase', 'Backpack']" :key="category">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h2 class="font-bold mb-3 uppercase text-sm tracking-widest text-gray-400" x-text="category"></h2>
                
                <!-- Use 'handle' to restrict sorting to the icon only -->
                <ul class="space-y-1" x-sort="onSort($item, $position, category)" x-sort:group="items" x-sort:handle=".handle">
                    <template x-for="item in items.filter(i => i.cat === category).sort((a, b) => b.isAuto - a.isAuto)" :key="item.id">
                        <li class="flex items-center justify-between p-2 border-b border-gray-50 bg-white swipe-item"
                            @touchstart="touchStart($event)"
                            @touchmove="touchMove($event, $el)"
                            @touchend="touchEnd($event, item, $el)">
                            
                            <!-- The Drag Handle -->
                            <div class="handle p-4 -ml-2 mr-1 text-gray-300 hover:text-blue-500">
                                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M4 9h16v2H4zm0 4h16v2H4z"/></svg>
                            </div>
                            
                            <span class="text-base flex-grow px-2 py-1">
                                <span x-text="item.name"></span>
                            </span>
                            
                            <div class="flex items-center gap-2">
                                <button @click="toggleStatus(item)" class="w-10 h-10 rounded-lg border-2 transition-colors text-lg" :class="statusClass(item)" x-text="item.status || '○'"></button>
                            </div>
                        </li>
                    </template>
                </ul>
            </div>
        </template>
    </div>
</div>

<script>
    function packerApp() {
        return {
            items: [],
            touchStartX: 0,
            
            // Logic for swipe vs drag
            touchStart(e) { this.touchStartX = e.touches[0].clientX; },
            touchMove(e, el) {
                // If it's a drag handle, let x-sort handle it. Otherwise, swipe.
                if (e.target.closest('.handle')) return;
                
                const diff = e.touches[0].clientX - this.touchStartX;
                if (diff < -20) el.style.transform = `translateX(${diff}px)`;
            },
            touchEnd(e, item, el) {
                const diff = e.changedTouches[0].clientX - this.touchStartX;
                if (diff < -100) { this.removeItem(item); } else { el.style.transform = 'translateX(0)'; }
            },
            
            onSort(item, position, newCategory) {
                const oldIndex = this.items.indexOf(item);
                this.items.splice(oldIndex, 1);
                item.cat = newCategory;
                this.items.splice(position, 0, item);
            },
            
            removeItem(item) { const index = this.items.findIndex(i => i.id === item.id); if (index !== -1) this.items.splice(index, 1); },
            toggleStatus(item) { const states = ['', '✓', 'X']; item.status = states[(states.indexOf(item.status) + 1) % 3]; },
            statusClass(item) { return {'bg-green-500 text-white border-green-500': item.status === '✓', 'bg-red-500 text-white border-red-500': item.status === 'X', 'bg-white': item.status === ''}; },
            get activeItemsCount() { return this.items.filter(i => i.status !== 'X').length; },
            get packedCount() { return this.items.filter(i => i.status === '✓').length; },
            get progress() { return this.activeItemsCount > 0 ? (this.packedCount / this.activeItemsCount) * 100 : 0; }
        }
    }
</script>
</body>
</html>
